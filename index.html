<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Floor Multi-Effects</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #1a1c1e;
    --panel-color: #2a2c30;
    --metal-dark: #1f2022;
    --metal-light: #3a3c40;
    --vfd-bg: #051010;
    --vfd-text: #00ffcc;
    --led-off: #300000;
    --led-red: #ff1111;
    --led-blue: #1177ff;
    --led-green: #11ff11;
    --led-orange: #ff8811;
  }
  * { box-sizing: border-box; user-select: none; }
  body {
    margin: 0; padding: 0;
    background-color: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .pedalboard {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--metal-dark), #111 80%);
    background-image: 
      url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>'),
      linear-gradient(135deg, var(--metal-dark), #111 80%);
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
  }
  .top-section {
    flex: 0 0 100px;
    background: linear-gradient(to bottom, #111, var(--metal-dark));
    border-bottom: 2px solid #000;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 10px 30px;
    justify-content: space-between;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    z-index: 10;
  }
  .cables-svg {
    position: absolute;
    top: -50px; left: 0; width: 100%; height: 150px;
    pointer-events: none;
    z-index: 1;
    filter: drop-shadow(0 10px 5px rgba(0,0,0,0.8));
  }
  .io-panel {
    display: flex; gap: 30px; z-index: 2; align-items: flex-end;
  }
  .jack-group {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .jack-label { color: #888; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
  .jack {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ddd, #666);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    display: flex; justify-content: center; align-items: center;
    border: 2px solid #222;
  }
  .jack-hole {
    width: 14px; height: 14px; border-radius: 50%;
    background: #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
  }
  .transport-controls {
    display: flex; gap: 15px; z-index: 2; align-items: center;
  }
  .file-upload-btn, .btn-transport {
    background: linear-gradient(to bottom, #444, #222);
    color: #ccc; border: 1px solid #111;
    padding: 8px 15px; border-radius: 4px;
    font-size: 12px; font-weight: bold; cursor: pointer;
    box-shadow: 0 3px 5px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
    transition: all 0.1s;
  }
  .file-upload-btn:active, .btn-transport:active {
    background: #222; box-shadow: inset 0 3px 5px rgba(0,0,0,0.8); transform: translateY(2px);
  }
  input[type="file"] { display: none; }
  .display-section {
    flex: 0 0 260px;
    display: flex;
    padding: 20px 40px;
    gap: 40px;
    background: linear-gradient(to bottom, #2a2c30, #1f2022);
    border-bottom: 2px solid #111;
  }
  .vfd-container {
    flex: 1;
    background: #111;
    border: 4px solid #000;
    border-radius: 10px;
    padding: 5px;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.9), 0 2px 5px rgba(255,255,255,0.05);
    display: flex; flex-direction: column;
    position: relative;
  }
  .vfd-glass {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%);
    pointer-events: none; border-radius: 6px; z-index: 5;
  }
  .vfd-screen {
    flex: 1;
    background-color: var(--vfd-bg);
    background-image: radial-gradient(rgba(0, 255, 204, 0.1) 1px, transparent 1px);
    background-size: 4px 4px;
    border-radius: 5px;
    padding: 15px;
    color: var(--vfd-text);
    font-family: 'Share Tech Mono', monospace;
    text-shadow: 0 0 4px var(--vfd-text), 0 0 8px var(--vfd-text);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .vfd-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(0,255,204,0.3); padding-bottom: 5px;}
  .vfd-params {
    display: flex; gap: 15px; flex: 1;
  }
  .vfd-param-col {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px;
  }
  .vfd-val { font-size: 22px; }
  .vfd-bar-container {
    width: 20px; height: 60px; border: 1px solid rgba(0,255,204,0.4);
    position: relative; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .vfd-bar-fill {
    width: 100%; background: var(--vfd-text); box-shadow: 0 0 5px var(--vfd-text);
    transition: height 0.1s;
  }
  .vfd-name { font-size: 12px; }
  .knobs-container {
    display: flex; gap: 20px; align-items: flex-end; padding-bottom: 10px;
  }
  .knob-unit {
    display: flex; flex-direction: column; align-items: center; gap: 10px; width: 60px;
  }
  .knob-wrapper {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 5px 10px rgba(0,0,0,0.8);
    position: relative;
    cursor: ns-resize;
  }
  .knob {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: 
      repeating-radial-gradient(circle at center, #333 0, #555 1px, #333 2px),
      conic-gradient(from 0deg, #444, #888, #444, #888, #444);
    background-blend-mode: multiply;
    box-shadow: inset 0 0 3px rgba(255,255,255,0.3), inset 0 -2px 5px rgba(0,0,0,0.5);
    position: absolute; top:0; left:0;
    transform: rotate(-150deg);
  }
  .knob::after {
    content: ''; position: absolute; top: 4px; left: 50%;
    width: 4px; height: 12px; background: #000;
    transform: translateX(-50%); border-radius: 2px;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
  }
  .knob-label { color: #888; font-size: 10px; font-weight: bold; }
  .chaos-section {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .chaos-pad-container {
    width: 180px; height: 160px;
    background: #000; border: 3px solid #222; border-radius: 8px;
    position: relative; overflow: hidden;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
    cursor: crosshair;
  }
  .chaos-grid {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background-image: 
      linear-gradient(rgba(255, 136, 17, 0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 136, 17, 0.2) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
  }
  .chaos-pointer {
    width: 15px; height: 15px;
    background: #ff8811; border-radius: 50%;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px #ff8811, 0 0 20px #ff8811;
    pointer-events: none;
    opacity: 0.5;
  }
  .chaos-pad-container.active .chaos-pointer { opacity: 1; }
  .chaos-label { color: #ff8811; font-family: 'Share Tech Mono', monospace; font-size: 12px; text-shadow: 0 0 5px #ff8811;}
  .footswitches-section {
    flex: 1;
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 20px 10px;
  }
  .fs-unit {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 8px;
  }
  .fs-led {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--led-off);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.1);
    transition: all 0.1s;
  }
  .fs-unit.active .fs-led[data-color="red"] { background: var(--led-red); box-shadow: 0 0 10px var(--led-red), 0 0 20px var(--led-red), inset 0 0 2px #fff; }
  .fs-unit.active .fs-led[data-color="blue"] { background: var(--led-blue); box-shadow: 0 0 10px var(--led-blue), 0 0 20px var(--led-blue), inset 0 0 2px #fff; }
  .fs-unit.active .fs-led[data-color="green"] { background: var(--led-green); box-shadow: 0 0 10px var(--led-green), 0 0 20px var(--led-green), inset 0 0 2px #fff; }
  .fs-unit.active .fs-led[data-color="orange"] { background: var(--led-orange); box-shadow: 0 0 10px var(--led-orange), 0 0 20px var(--led-orange), inset 0 0 2px #fff; }
  .fs-label {
    color: #aaa; font-size: 11px; font-weight: bold; letter-spacing: 0.5px;
    text-align: center; height: 26px; display: flex; align-items: center;
    text-shadow: 0 1px 1px #000;
  }
  .fs-switch-wrapper {
    width: 50px; height: 50px;
    position: relative;
    display: flex; justify-content: center; align-items: center;
  }
  .fs-nut {
    width: 44px; height: 44px;
    background: conic-gradient(#777, #ccc, #777, #ccc, #777);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    position: absolute;
    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
  }
  .fs-washer {
    width: 34px; height: 34px; border-radius: 50%;
    background: #555; position: absolute;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
  }
  .fs-plunger {
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, #999);
    position: absolute; z-index: 2;
    box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.05s, box-shadow 0.05s;
  }
  .fs-plunger:active {
    transform: translateY(3px);
    box-shadow: 0 1px 2px rgba(0,0,0,0.6), inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .fs-edit-btn {
    background: transparent; color: #666; border: 1px solid #444;
    font-size: 9px; padding: 2px 6px; border-radius: 3px; cursor: pointer;
    margin-top: 5px;
  }
  .fs-edit-btn:hover { color: #ccc; border-color: #888; }
  .fs-edit-btn.editing { background: #00ffcc; color: #000; border-color: #00ffcc; box-shadow: 0 0 5px #00ffcc;}
</style>
</head>
<body>
<div class="pedalboard">
  <svg class="cables-svg" viewBox="0 0 1000 150" preserveAspectRatio="none">
    <path d="M 100,-20 C 120,80 250,120 300,-20" stroke="#111" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 105,-20 C 125,80 245,120 295,-20" stroke="#333" stroke-width="6" fill="none" />
    <path d="M 400,-20 C 350,150 600,100 550,-20" stroke="#111" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 405,-20 C 355,150 595,100 545,-20" stroke="#ff3333" stroke-width="8" fill="none" />
    <path d="M 700,-20 C 800,90 950,50 900,-20" stroke="#111" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 703,-20 C 800,90 947,50 897,-20" stroke="#33ccff" stroke-width="4" fill="none" />
  </svg>
  <div class="top-section">
    <div class="io-panel">
      <div class="jack-group">
        <span class="jack-label">INPUT</span>
        <div class="jack"><div class="jack-hole"></div></div>
      </div>
    </div>
    <div class="transport-controls">
      <input type="file" id="audio-upload" accept="audio/*">
      <button class="file-upload-btn" onclick="document.getElementById('audio-upload').click()">📁 LOAD AUDIO</button>
      <button class="btn-transport" id="btn-play">▶ PLAY</button>
      <button class="btn-transport" id="btn-stop">■ STOP</button>
      <button class="btn-transport" id="btn-loop" style="color:#666">LOOP: OFF</button>
    </div>
    <div class="io-panel">
      <div class="jack-group">
        <span class="jack-label">L/MONO OUT</span>
        <div class="jack"><div class="jack-hole"></div></div>
      </div>
      <div class="jack-group">
        <span class="jack-label">R OUT</span>
        <div class="jack"><div class="jack-hole"></div></div>
      </div>
    </div>
  </div>
  <div class="display-section">
    <div class="vfd-container">
      <div class="vfd-glass"></div>
      <div class="vfd-screen" id="vfd-screen">
        <div class="vfd-title" id="vfd-title">SYSTEM READY</div>
        <div class="vfd-params" id="vfd-params">
           <div style="font-size: 16px; margin-top:20px;">PLEASE LOAD AUDIO FILE.</div>
        </div>
      </div>
    </div>
    <div class="knobs-container" id="knobs-container">
    </div>
    <div class="chaos-section">
      <div class="fs-unit" id="fs-chaos">
        <div class="fs-led" data-color="orange" id="led-chaos"></div>
        <div class="chaos-label">CHAOS PAD</div>
      </div>
      <div class="chaos-pad-container" id="chaos-pad">
        <div class="chaos-grid"></div>
        <div class="chaos-pointer" id="chaos-pointer"></div>
      </div>
      <button class="fs-edit-btn" id="edit-chaos" onclick="ui.selectEffect(18)">EDIT</button>
    </div>
  </div>
  <div class="footswitches-section" id="fs-grid">
  </div>
</div>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sourceNode = null;
let audioBuffer = null;
let isPlaying = false;
let isLooping = false;
let globalInput = audioCtx.createGain();
let globalOutput = audioCtx.createGain();
globalOutput.connect(audioCtx.destination);
function makeCurve(type) {
  const n = 4096;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    let x = (i * 2) / n - 1;
    switch (type) {
      case 'asym': 
        curve[i] = x > 0 ? Math.tanh(x * 2.5) : Math.tanh(x * 1.5) * 0.5; break;
      case 'soft': 
        curve[i] = x / (1 + Math.abs(x)); break;
      case 'hard': 
        curve[i] = Math.max(-0.6, Math.min(0.6, x * 10)); break;
      case 'cold': 
        let y = Math.sin(x * Math.PI) * 1.5;
        curve[i] = Math.max(-0.8, Math.min(0.8, y)); break;
      case 'fuzz': 
        curve[i] = x < 0 ? -1 : 1; break;
      case 'rectify': 
        curve[i] = Math.abs(x) * 2 - 1; break;
    }
  }
  return curve;
}
const curves = {
  od1: makeCurve('asym'), od2: makeCurve('soft'),
  ds1: makeCurve('cold'), ds2: makeCurve('hard'),
  fuzz: makeCurve('fuzz'), rectify: makeCurve('rectify')
};
class EffectBase {
  constructor(name, type, color) {
    this.name = name; this.type = type; this.color = color;
    this.isOn = false;
    this.input = audioCtx.createGain();
    this.output = audioCtx.createGain();
    this.dry = audioCtx.createGain();
    this.wet = audioCtx.createGain();
    this.input.connect(this.dry);
    this.dry.connect(this.output);
    this.wet.connect(this.output);
    this.dry.gain.value = 1; this.wet.gain.value = 0;
    this.params = []; this.nodes = {};
  }
  toggle() {
    this.isOn = !this.isOn;
    this.dry.gain.setTargetAtTime(this.isOn ? 0 : 1, audioCtx.currentTime, 0.01);
    this.wet.gain.setTargetAtTime(this.isOn ? 1 : 0, audioCtx.currentTime, 0.01);
  }
  setParam(index, val) {
    const p = this.params[index];
    if(p) { p.val = val; p.onChange(val); }
  }
  connectEffect(firstNode, lastNode) {
    this.input.connect(firstNode);
    lastNode.connect(this.wet);
  }
}
class Compressor extends EffectBase {
  constructor() {
    super('COMPRESSOR', 'comp', 'blue');
    this.comp = audioCtx.createDynamicsCompressor();
    this.gain = audioCtx.createGain();
    this.comp.connect(this.gain);
    this.connectEffect(this.comp, this.gain);
    this.params = [
      { name: 'SUS', min: -50, max: -10, val: -30, disp: v=>v.toFixed(0), onChange: v => this.comp.threshold.value = v },
      { name: 'ATK', min: 0.001, max: 0.1, val: 0.01, disp: v=>(v*1000).toFixed(0), onChange: v => this.comp.attack.value = v },
      { name: 'LVL', min: 0, max: 2, val: 1, disp: v=>(v*50).toFixed(0), onChange: v => this.gain.gain.value = v }
    ];
  }
}
class AutoWah extends EffectBase {
  constructor() {
    super('AUTO WAH', 'filter', 'green');
    this.filter = audioCtx.createBiquadFilter();
    this.filter.type = 'bandpass';
    this.follower = audioCtx.createScriptProcessor(512, 1, 1);
    this.sens = 10000; this.baseFreq = 200;
    this.input.connect(this.follower);
    this.follower.connect(audioCtx.destination); 
    this.follower.onaudioprocess = (e) => {
      const inData = e.inputBuffer.getChannelData(0);
      let sum = 0;
      for(let i=0; i<inData.length; i++) sum += inData[i]*inData[i];
      let rms = Math.sqrt(sum / inData.length);
      let targetFreq = this.baseFreq + rms * this.sens;
      targetFreq = Math.min(5000, Math.max(100, targetFreq));
      this.filter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.02);
    };
    this.connectEffect(this.filter, this.filter);
    this.params = [
      { name: 'SENS', min: 1000, max: 20000, val: 10000, disp: v=>(v/200).toFixed(0), onChange: v => this.sens = v },
      { name: 'FREQ', min: 100, max: 1000, val: 200, disp: v=>v.toFixed(0), onChange: v => this.baseFreq = v },
      { name: 'PEAK', min: 1, max: 20, val: 10, disp: v=>v.toFixed(1), onChange: v => this.filter.Q.value = v }
    ];
  }
}
class PitchShift extends EffectBase {
  constructor() {
    super('PITCH SHIFT', 'pitch', 'blue');
    this.osc = audioCtx.createOscillator();
    this.osc.type = 'sine';
    this.osc.start();
    this.gain = audioCtx.createGain();
    this.gain.gain.value = 0; 
    this.osc.connect(this.gain.gain);
    this.modNode = audioCtx.createGain();
    this.input.connect(this.modNode);
    this.gain.connect(this.modNode.gain); 
    this.connectEffect(this.modNode, this.modNode);
    this.params = [
      { name: 'PITCH', min: 10, max: 2000, val: 400, disp: v=>v.toFixed(0), onChange: v => this.osc.frequency.value = v },
      { name: 'BAL', min: 0, max: 1, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => { this.dry.gain.value = this.isOn ? 1-v : 1; this.wet.gain.value = this.isOn ? v : 0; } }
    ];
  }
  toggle() {
    super.toggle();
    const bal = this.params[1].val;
    this.dry.gain.value = this.isOn ? 1 - bal : 1;
    this.wet.gain.value = this.isOn ? bal : 0;
  }
}
class Octaver extends EffectBase {
  constructor() {
    super('OCTAVER', 'pitch', 'blue');
    this.lp = audioCtx.createBiquadFilter();
    this.lp.type = 'lowpass'; this.lp.frequency.value = 300;
    this.processor = audioCtx.createScriptProcessor(512, 1, 1);
    this.phase = 1; this.lastSample = 0;
    this.processor.onaudioprocess = (e) => {
      let inData = e.inputBuffer.getChannelData(0);
      let outData = e.outputBuffer.getChannelData(0);
      for (let i = 0; i < inData.length; i++) {
        let s = inData[i];
        if (this.lastSample > 0 && s <= 0) this.phase *= -1; 
        outData[i] = this.phase * Math.abs(s);
        this.lastSample = s;
      }
    };
    this.outGain = audioCtx.createGain();
    this.lp.connect(this.processor);
    this.processor.connect(this.outGain);
    this.input.connect(this.lp);
    this.connectEffect(this.lp, this.outGain);
    this.params = [
      { name: 'OCT1', min: 0, max: 2, val: 1, disp: v=>(v*50).toFixed(0), onChange: v => this.outGain.gain.value = v },
      { name: 'DRCT', min: 0, max: 1, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => { this.dry.gain.value = this.isOn ? v : 1; } }
    ];
  }
  toggle() {
    super.toggle();
    this.dry.gain.value = this.isOn ? this.params[1].val : 1;
  }
}
class Fuzz extends EffectBase {
  constructor() {
    super('FUZZ', 'dist', 'red');
    this.ws = audioCtx.createWaveShaper();
    this.ws.curve = curves.fuzz;
    this.preGain = audioCtx.createGain();
    this.postGain = audioCtx.createGain();
    this.tone = audioCtx.createBiquadFilter();
    this.tone.type = 'lowpass';
    this.preGain.connect(this.ws);
    this.ws.connect(this.tone);
    this.tone.connect(this.postGain);
    this.connectEffect(this.preGain, this.postGain);
    this.params = [
      { name: 'FUZZ', min: 1, max: 100, val: 50, disp: v=>v.toFixed(0), onChange: v => this.preGain.gain.value = v },
      { name: 'TONE', min: 200, max: 5000, val: 1500, disp: v=>(v/50).toFixed(0), onChange: v => this.tone.frequency.value = v },
      { name: 'LVL', min: 0, max: 1, val: 0.3, disp: v=>(v*100).toFixed(0), onChange: v => this.postGain.gain.value = v }
    ];
  }
}
class NoiseGate extends EffectBase {
  constructor() {
    super('NOISE GATE', 'gate', 'green');
    this.comp = audioCtx.createDynamicsCompressor();
    this.comp.threshold.value = -40;
    this.comp.ratio.value = 20;
    this.comp.attack.value = 0.005;
    this.comp.release.value = 0.1;
    this.connectEffect(this.comp, this.comp);
    this.params = [
      { name: 'THR', min: -80, max: -20, val: -40, disp: v=>v.toFixed(0), onChange: v => this.comp.threshold.value = v },
      { name: 'REL', min: 0.01, max: 0.5, val: 0.1, disp: v=>(v*1000).toFixed(0), onChange: v => this.comp.release.value = v }
    ];
  }
}
class Overdrive1 extends EffectBase {
  constructor() {
    super('OVERDRIVE 1', 'dist', 'orange');
    this.preEq = audioCtx.createBiquadFilter(); this.preEq.type = 'peaking'; this.preEq.frequency.value = 800; this.preEq.gain.value = 5;
    this.preGain = audioCtx.createGain();
    this.ws = audioCtx.createWaveShaper(); this.ws.curve = curves.od1;
    this.tone = audioCtx.createBiquadFilter(); this.tone.type = 'lowpass';
    this.postGain = audioCtx.createGain();
    this.preEq.connect(this.preGain); this.preGain.connect(this.ws);
    this.ws.connect(this.tone); this.tone.connect(this.postGain);
    this.connectEffect(this.preEq, this.postGain);
    this.params = [
      { name: 'DRV', min: 1, max: 20, val: 10, disp: v=>(v*5).toFixed(0), onChange: v => this.preGain.gain.value = v },
      { name: 'TONE', min: 1000, max: 6000, val: 3000, disp: v=>(v/60).toFixed(0), onChange: v => this.tone.frequency.value = v },
      { name: 'LVL', min: 0, max: 1, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => this.postGain.gain.value = v }
    ];
  }
}
class Overdrive2 extends EffectBase {
  constructor() {

      { name: 'LVL', min: 0, max: 1, val: 0.6, disp: v=>(v*100).toFixed(0), onChange: v => this.postGain.gain.value = v }
    ];
  }
}
class Distortion1 extends EffectBase {
  constructor() {
    super('DISTORTION 1', 'dist', 'red');
    this.hp = audioCtx.createBiquadFilter(); this.hp.type = 'highpass'; this.hp.frequency.value = 600;
    this.preGain = audioCtx.createGain();
    this.ws = audioCtx.createWaveShaper(); this.ws.curve = curves.ds1;
    this.contour = audioCtx.createBiquadFilter(); this.contour.type = 'peaking'; this.contour.frequency.value = 1000; this.contour.gain.value = -10;
    this.postGain = audioCtx.createGain();
    this.hp.connect(this.preGain); this.preGain.connect(this.ws);
    this.ws.connect(this.contour); this.contour.connect(this.postGain);
    this.connectEffect(this.hp, this.postGain);
    this.params = [
      { name: 'DRV', min: 5, max: 50, val: 30, disp: v=>(v*2).toFixed(0), onChange: v => this.preGain.gain.value = v },
      { name: 'PNCH', min: 100, max: 500, val: 300, disp: v=>v.toFixed(0), onChange: v => this.hp.frequency.value = 700 - v },
      { name: 'CNTR', min: -20, max: 0, val: -10, disp: v=>(20+v)*5, onChange: v => this.contour.gain.value = v },
      { name: 'LVL', min: 0, max: 1, val: 0.4, disp: v=>(v*100).toFixed(0), onChange: v => this.postGain.gain.value = v }
    ];
  }
}
class Distortion2 extends EffectBase {
  constructor() {
    super('DISTORTION 2', 'dist', 'orange');
    this.preGain = audioCtx.createGain();
    this.ws = audioCtx.createWaveShaper(); this.ws.curve = curves.ds2;

      { name: 'DRV', min: 2, max: 40, val: 20, disp: v=>(v*2.5).toFixed(0), onChange: v => this.preGain.gain.value = v },
      { name: 'TONE', min: -10, max: 10, val: 5, disp: v=>(v*5+50).toFixed(0), onChange: v => this.tone.gain.value = v },
      { name: 'LVL', min: 0, max: 1, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => this.postGain.gain.value = v }

class Booster extends EffectBase {
  constructor() {
    super('BOOSTER', 'eq', 'red');
    this.gain = audioCtx.createGain();
    this.eq = audioCtx.createBiquadFilter(); this.eq.type='peaking'; this.eq.frequency.value=1000;
    this.gain.connect(this.eq);
    this.connectEffect(this.gain, this.eq);
    this.params = [
      { name: 'GAIN', min: 1, max: 10, val: 2, disp: v=>(v*10).toFixed(0), onChange: v => this.gain.gain.value = v },
      { name: 'TONE', min: -10, max: 10, val: 0, disp: v=>(v*5+50).toFixed(0), onChange: v => this.eq.gain.value = v }
    ];
  }
}
class GraphicEQ extends EffectBase {
  constructor() {
    super('GRAPHIC EQ', 'eq', 'green');
    this.bands = [100, 400, 1000, 3000, 8000].map(f => {
      let b = audioCtx.createBiquadFilter(); b.type = 'peaking'; b.frequency.value = f; return b;
    });
    for(let i=0; i<4; i++) this.bands[i].connect(this.bands[i+1]);
    this.connectEffect(this.bands[0], this.bands[4]);
    this.params = this.bands.map((b, i) => ({
      name: b.frequency.value < 1000 ? b.frequency.value : (b.frequency.value/1000)+'k',
      min: -15, max: 15, val: 0, disp: v => v>0 ? '+'+v.toFixed(0) : v.toFixed(0),
      onChange: v => b.gain.value = v
    }));
  }
}
class Modulation extends EffectBase {
  constructor() {
    super('MODULATION', 'mod', 'blue');
    this.ap1 = audioCtx.createBiquadFilter(); this.ap1.type = 'allpass';
    this.ap2 = audioCtx.createBiquadFilter(); this.ap2.type = 'allpass';
    this.lfo = audioCtx.createOscillator(); this.lfoGain = audioCtx.createGain();
    this.fb = audioCtx.createGain(); this.fb.gain.value = 0.5;
    this.ap1.connect(this.ap2); this.ap2.connect(this.fb); this.fb.connect(this.ap1);
    this.lfo.connect(this.lfoGain);
    this.lfoGain.connect(this.ap1.frequency); this.lfoGain.connect(this.ap2.frequency);
    this.lfo.start();
    this.connectEffect(this.ap1, this.ap2);
    this.params = [
      { name: 'RATE', min: 0.1, max: 10, val: 1, disp: v=>v.toFixed(1), onChange: v => this.lfo.frequency.value = v },
      { name: 'DPTH', min: 100, max: 2000, val: 1000, disp: v=>(v/20).toFixed(0), onChange: v => this.lfoGain.gain.value = v },
      { name: 'RES', min: 0, max: 0.9, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => this.fb.gain.value = v }
    ];
  }
}
class Flanger extends EffectBase {
  constructor() {
    super('FLANGER', 'mod', 'green');
    this.delay = audioCtx.createDelay(0.02);
    this.lfo = audioCtx.createOscillator(); this.lfoGain = audioCtx.createGain();
    this.fb = audioCtx.createGain();
    this.lfo.connect(this.lfoGain); this.lfoGain.connect(this.delay.delayTime);
    this.delay.connect(this.fb); this.fb.connect(this.delay);
    this.lfo.start();
    this.connectEffect(this.delay, this.delay);
    this.params = [
      { name: 'RATE', min: 0.1, max: 5, val: 0.5, disp: v=>v.toFixed(1), onChange: v => this.lfo.frequency.value = v },
      { name: 'DPTH', min: 0.001, max: 0.01, val: 0.005, disp: v=>(v*10000).toFixed(0), onChange: v => this.lfoGain.gain.value = v },
      { name: 'MANU', min: 0.001, max: 0.01, val: 0.003, disp: v=>(v*10000).toFixed(0), onChange: v => this.delay.delayTime.value = v },
      { name: 'RES', min: 0, max: 0.9, val: 0.7, disp: v=>(v*100).toFixed(0), onChange: v => this.fb.gain.value = v }
    ];
  }
}
class Chorus extends EffectBase {
  constructor() {
    super('CHORUS', 'mod', 'blue');

    this.lfo = audioCtx.createOscillator(); this.lfoGain = audioCtx.createGain();

      { name: 'MIX', min: 0, max: 1, val: 0.5, disp: v=>(v*100).toFixed(0), onChange: v => { this.wet.gain.value = this.isOn?v:0; } }

}
class Tremolo extends EffectBase {

class Slicer extends EffectBase {

    this.lfoGain = audioCtx.createGain();

    this.lfoGain.connect(this.gain.gain);
    this.lfo.start();

      { name: 'RATE', min: 2, max: 20, val: 8, disp: v=>v.toFixed(1), onChange: v => this.lfo.frequency.value = v },
      { name: 'DPTH', min: 0, max: 1, val: 1, disp: v=>(v*100).toFixed(0), onChange: v => this.lfoGain.gain.value = v }

  }
}
class Delay extends EffectBase {
  constructor() {
    super('DELAY', 'delay', 'blue');
    this.delay = audioCtx.createDelay(2.0);
    this.fb = audioCtx.createGain();
    this.lp = audioCtx.createBiquadFilter(); this.lp.type = 'lowpass'; this.lp.frequency.value = 3000;
    this.delay.connect(this.fb); this.fb.connect(this.lp); this.lp.connect(this.delay);
    this.connectEffect(this.delay, this.delay);
    this.params = [
      { name: 'TIME', min: 0.05, max: 1.5, val: 0.4, disp: v=>(v*1000).toFixed(0), onChange: v => this.delay.delayTime.value = v },
      { name: 'FDBK', min: 0, max: 0.95, val: 0.4, disp: v=>(v*100).toFixed(0), onChange: v => this.fb.gain.value = v },
      { name: 'HI-C', min: 500, max: 5000, val: 3000, disp: v=>(v/50).toFixed(0), onChange: v => this.lp.frequency.value = v },
      { name: 'MIX', min: 0, max: 1, val: 0.3, disp: v=>(v*100).toFixed(0), onChange: v => { this.wet.gain.value = this.isOn?v:0; } }
    ];
  }
  toggle() {
    super.toggle();
    this.wet.gain.value = this.isOn ? this.params[3].val : 0;
  }
}
class ChaosPad extends EffectBase {
  constructor() {
    super('CHAOS PAD', 'special', 'orange');
    this.filter = audioCtx.createBiquadFilter(); this.filter.type = 'lowpass';
    this.delay = audioCtx.createDelay(1.0); this.delay.delayTime.value = 0.2;
    this.fb = audioCtx.createGain(); this.fb.gain.value = 0.5;
    this.filter.connect(this.delay);
    this.delay.connect(this.fb); this.fb.connect(this.delay);
    this.delay.connect(this.wet);
    this.input.connect(this.filter); 
    this.dry.gain.value = 1; this.wet.gain.value = 0;
    this.x = 0.5; this.y = 0.5;
  }
  setXY(x, y) {
    this.x = x; this.y = y;
    if(this.isOn) {
      this.filter.frequency.setTargetAtTime(100 + x * 4900, audioCtx.currentTime, 0.05);
      this.filter.Q.value = 10 + x * 10;
      this.delay.delayTime.setTargetAtTime(0.02 + y * 0.48, audioCtx.currentTime, 0.05);
      this.fb.gain.setTargetAtTime(y * 0.95, audioCtx.currentTime, 0.05);
    }
  }
  toggle() {
    super.toggle();
    this.wet.gain.setTargetAtTime(this.isOn ? 1 : 0, audioCtx.currentTime, 0.05);
  }
}
const effectsList = [
  new Compressor(), new AutoWah(), new PitchShift(), new Octaver(), new Fuzz(), new NoiseGate(),
  new Overdrive1(), new Overdrive2(), new Distortion1(), new Distortion2(), new Booster(), new GraphicEQ(),
  new Modulation(), new Flanger(), new Chorus(), new Tremolo(), new Slicer(), new Delay(),
  new ChaosPad()
];
let prevNode = globalInput;
effectsList.forEach(eff => {
  prevNode.connect(eff.input);
  prevNode = eff.output;
});
prevNode.connect(globalOutput);
const ui = {
  currentEditIdx: -1,
  init() {
    this.buildGrid();
    this.selectEffect(8); 
    this.initChaosPad();
  },
  buildGrid() {
    const grid = document.getElementById('fs-grid');
    for(let i=0; i<18; i++) {
      const eff = effectsList[i];
      const div = document.createElement('div');
      div.className = 'fs-unit';
      div.innerHTML = `
        <div class="fs-led" data-color="${eff.color}" id="led-${i}"></div>
        <div class="fs-label">${eff.name}</div>
        <div class="fs-switch-wrapper" onmousedown="ui.toggleEffect(${i})">
          <div class="fs-nut"></div>
          <div class="fs-washer"></div>
          <div class="fs-plunger"></div>
        </div>
        <button class="fs-edit-btn" id="edit-btn-${i}" onclick="ui.selectEffect(${i})">EDIT</button>
      `;
      grid.appendChild(div);
    }
    document.getElementById('fs-chaos').querySelector('.fs-led').onclick = 
    document.getElementById('fs-chaos').querySelector('.chaos-label').onclick = 
    document.getElementById('led-chaos').parentElement.onclick = (e) => {
      if(e.target.tagName !== 'BUTTON') ui.toggleEffect(18);
    };
  },
  toggleEffect(idx) {
    const eff = effectsList[idx];
    eff.toggle();
    const led = idx === 18 ? document.getElementById('fs-chaos') : document.getElementById(`led-${idx}`).parentElement;
    if(eff.isOn) led.classList.add('active');
    else led.classList.remove('active');
  },
  selectEffect(idx) {
    if(this.currentEditIdx !== -1) {
      const oldBtn = this.currentEditIdx === 18 ? document.getElementById('edit-chaos') : document.getElementById(`edit-btn-${this.currentEditIdx}`);
      if(oldBtn) oldBtn.classList.remove('editing');
    }
    this.currentEditIdx = idx;
    const newBtn = idx === 18 ? document.getElementById('edit-chaos') : document.getElementById(`edit-btn-${idx}`);
    if(newBtn) newBtn.classList.add('editing');
    this.updateVFD();
  },
  updateVFD() {
    const eff = effectsList[this.currentEditIdx];
    document.getElementById('vfd-title').innerText = eff.name + (eff.isOn ? ' [ON]' : ' [OFF]');
    const paramsDiv = document.getElementById('vfd-params');
    const knobsDiv = document.getElementById('knobs-container');
    paramsDiv.innerHTML = '';
    knobsDiv.innerHTML = '';
    if (eff.name === 'CHAOS PAD') {
      paramsDiv.innerHTML = '<div style="font-size:14px; margin-top:20px;">USE TOUCH PAD TO CONTROL<br>X: FILTER FREQ<br>Y: DELAY FDBK</div>';
      return;
    }
    eff.params.forEach((p, i) => {
      const pCol = document.createElement('div');
      pCol.className = 'vfd-param-col';
      const pct = ((p.val - p.min) / (p.max - p.min)) * 100;
      pCol.innerHTML = `
        <div class="vfd-val" id="vfd-val-${i}">${p.disp(p.val)}</div>
        <div class="vfd-bar-container"><div class="vfd-bar-fill" id="vfd-bar-${i}" style="height:${pct}%"></div></div>
        <div class="vfd-name">${p.name}</div>
      `;
      paramsDiv.appendChild(pCol);
      const kUnit = document.createElement('div');
      kUnit.className = 'knob-unit';
      kUnit.innerHTML = `
        <div class="knob-wrapper" data-idx="${i}" data-min="${p.min}" data-max="${p.max}">
          <div class="knob" id="knob-${i}" style="transform:rotate(${-150 + pct*3}deg)"></div>
        </div>
        <div class="knob-label">${p.name}</div>
      `;
      knobsDiv.appendChild(kUnit);
    });
    this.bindKnobs();
  },
  bindKnobs() {
    let activeKnob = null;
    let startY = 0;
    let startVal = 0; 
    const wrappers = document.querySelectorAll('.knob-wrapper');
    wrappers.forEach(w => {
      w.onmousedown = (e) => {
        activeKnob = w;
        startY = e.clientY;
        const pIdx = w.dataset.idx;
        const p = effectsList[this.currentEditIdx].params[pIdx];
        startVal = (p.val - p.min) / (p.max - p.min);
        document.onmousemove = onMove;
        document.onmouseup = onUp;
      };
    });
    const onMove = (e) => {
      if(!activeKnob) return;
      const dy = startY - e.clientY;
      let val = startVal + dy * 0.005; 
      val = Math.max(0, Math.min(1, val));
      const pIdx = activeKnob.dataset.idx;
      const eff = effectsList[this.currentEditIdx];
      const p = eff.params[pIdx];
      const realVal = p.min + val * (p.max - p.min);
      eff.setParam(pIdx, realVal);
      document.getElementById(`knob-${pIdx}`).style.transform = `rotate(${-150 + val*300}deg)`;
      document.getElementById(`vfd-val-${pIdx}`).innerText = p.disp(realVal);
      document.getElementById(`vfd-bar-${pIdx}`).style.height = `${val*100}%`;
    };
    const onUp = () => {
      activeKnob = null;
      document.onmousemove = null;
      document.onmouseup = null;
    };
  },
  initChaosPad() {
    const pad = document.getElementById('chaos-pad');
    const ptr = document.getElementById('chaos-pointer');
    let isDragging = false;
    const update = (e) => {
      const rect = pad.getBoundingClientRect();
      let x = (e.clientX - rect.left) / rect.width;
      let y = 1.0 - (e.clientY - rect.top) / rect.height;
      x = Math.max(0, Math.min(1, x));
      y = Math.max(0, Math.min(1, y));
      ptr.style.left = `${x*100}%`;
      ptr.style.top = `${(1-y)*100}%`;
      effectsList[18].setXY(x, y); 
    };
    pad.onmousedown = (e) => { isDragging = true; pad.classList.add('active'); update(e); };
    document.addEventListener('mousemove', (e) => { if(isDragging) update(e); });
    document.addEventListener('mouseup', () => { isDragging = false; pad.classList.remove('active'); });
  }
};
document.getElementById('audio-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      if(audioCtx.state === 'suspended') await audioCtx.resume();
      audioBuffer = await audioCtx.decodeAudioData(ev.target.result);
      document.getElementById('vfd-title').innerText = "AUDIO LOADED";
      setTimeout(()=>ui.updateVFD(), 1000);
    } catch(err) {
      alert("Error decoding audio file.");
    }
  };
  reader.readAsArrayBuffer(file);
});
function stopAudio() {
  if(sourceNode) {
    try { sourceNode.stop(); } catch(e){}
    sourceNode.disconnect();
    sourceNode = null;
  }
  isPlaying = false;
  document.getElementById('btn-play').innerText = "▶ PLAY";
}
document.getElementById('btn-play').addEventListener('click', async () => {
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(!audioBuffer) return;
  if(isPlaying) {
    stopAudio();
    return;
  }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.loop = isLooping;
  sourceNode.connect(globalInput);
  sourceNode.start(0);
  isPlaying = true;
  document.getElementById('btn-play').innerText = "⏸ PAUSE";
  sourceNode.onended = () => { if(!isLooping) stopAudio(); };
});
document.getElementById('btn-stop').addEventListener('click', stopAudio);
document.getElementById('btn-loop').addEventListener('click', (e) => {
  isLooping = !isLooping;
  e.target.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
  e.target.style.color = isLooping ? "#fff" : "#666";
  if(sourceNode) sourceNode.loop = isLooping;
});
window.onload = () => {
  ui.init();
  effectsList.forEach(eff => {
    eff.params.forEach((p, i) => eff.setParam(i, p.val));
  });
};
