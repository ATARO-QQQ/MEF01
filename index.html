<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;

function makeGateCurve(threshold) {
    const n = 44100;
    const curve = new Float32Array(n);
    const th = threshold / 100 * 0.1; 
    for (let i = 0; i < n; i++) {
        let x = i * 2 / n - 1;
        if (Math.abs(x) < th) {
            curve[i] = x * Math.pow(Math.abs(x)/th, 2);
        } else {
            curve[i] = x;
        }
    }
    return curve;
}
function makeHardClipCurve(amount) {
    const k = amount / 10;
    const n = 44100;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; ++i) {
        let x = i * 2 / n - 1;
        curve[i] = Math.max(-1, Math.min(1, x * (3 + k * 15))); 
    }
    return curve;
}
function makeAsymmetricCurve(amount) {
    const k = amount / 10;
    const n = 44100;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; ++i) {
        let x = i * 2 / n - 1;
        if (x > 0) {
            curve[i] = Math.tanh(x * (1 + k * 8));
        } else {
            curve[i] = Math.tanh(x * (1 + k * 3));
        }
    }
    return curve;
}
function makeSoftClipCurve(amount) {
    const k = amount / 10;
    const n = 44100;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; ++i) {
        let x = i * 2 / n - 1;
        curve[i] = Math.tanh(x * (1 + k * 5));
    }
    return curve;
}
function makeFuzzCurve(amount) {
    const k = amount / 10;
    const n = 44100;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; ++i) {
        let x = i * 2 / n - 1;
        let val = x * (10 + k * 100);
        curve[i] = Math.sign(val) * (1 - Math.exp(-Math.abs(val)));
        if(curve[i] > 0.8) curve[i] = 0.8; 
    }
    return curve;
}
class EffectNode {
    constructor(ctx, id, name, colorClass) {
        this.ctx = ctx;
        this.id = id;
        this.name = name;
        this.colorClass = colorClass;
        this.input = ctx.createGain();
        this.output = ctx.createGain();
        this.dryGain = ctx.createGain();
        this.wetGain = ctx.createGain();
        this.effectInput = ctx.createGain();
        this.effectOutput = ctx.createGain();
        this.input.connect(this.dryGain);
        this.dryGain.connect(this.output);
        this.input.connect(this.effectInput);
        this.effectOutput.connect(this.wetGain);
        this.wetGain.connect(this.output);
        this.bypass = true;
        this.targetDry = 1.0;
        this.targetWet = 1.0;
        this.params = []; 
        this.applyBypass();
    }
    setMix(dry, wet) {
        this.targetDry = dry;
        this.targetWet = wet;
        this.applyBypass();
    }
    applyBypass() {
        const t = this.ctx ? this.ctx.currentTime : 0;
        if(this.bypass) {
            this.dryGain.gain.setTargetAtTime(1.0, t, 0.01);
            this.wetGain.gain.setTargetAtTime(0.0, t, 0.01);
        } else {
            this.dryGain.gain.setTargetAtTime(this.targetDry, t, 0.01);
            this.wetGain.gain.setTargetAtTime(this.targetWet, t, 0.01);
        }
    }
    toggle() {
        this.bypass = !this.bypass;
        this.applyBypass();
        return this.bypass;
    }
    updateParam(index, ratio) {
        if(index >= this.params.length) return;
        const p = this.params[index];
        p.val = p.min + ratio * (p.max - p.min);
        this.onParamChange();
    }
    onParamChange() {}
}
class GateEffect extends EffectNode {
    constructor(ctx) {
        super(ctx, 'gate', 'GATE', 'active-yellow');
        this.shaper = ctx.createWaveShaper();
        this.effectInput.connect(this.shaper);
        this.shaper.connect(this.effectOutput);
        this.params = [
            { id: 'thresh', name: 'THRESH', min: 0, max: 100, val: 20 },
            { id: 'level', name: 'LEVEL', min: 0, max: 100, val: 50 }
        ];
        this.onParamChange();
    }
    onParamChange() {
        this.shaper.curve = makeGateCurve(this.params[0].val);
        this.effectOutput.gain.value = this.params[1].val / 50;
    }
}
class CompEffect extends EffectNode {
    constructor(ctx) {
        super(ctx, 'comp', 'COMP', 'active-yellow');
        this.comp = ctx.createDynamicsCompressor();
        this.effectInput.connect(this.comp);
        this.comp.connect(this.effectOutput);
        this.params = [
            { id: 'thresh', name: 'THRESH', min: -60, max: 0, val: -30 },
            { id: 'ratio', name: 'RATIO', min: 1, max: 20, val: 4 },
            { id: 'attack', name: 'ATTACK', min: 0.001, max: 0.5, val: 0.05 },
            { id: 'level', name: 'LEVEL', min: 0, max: 100, val: 50 }
        ];
        this.onParamChange();
    }
    onParamChange() {
        this.comp.threshold.value = this.params[0].val;
        this.comp.ratio.value = this.params[1].val;
        this.comp.attack.value = this.params[2].val;
        this.effectOutput.gain.value = this.params[3].val / 50;
    }
}
class AutoWahEffect extends EffectNode {
    constructor(ctx) {
        super(ctx, 'aw', 'AUTO WAH', 'active-yellow');
        this.filter = ctx.createBiquadFilter();
        this.filter.type = 'bandpass';
        this.lfo = ctx.createOscillator();
        this.lfo.type = 'sine';
        this.lfoGain = ctx.createGain();
        this.lfo.connect(this.lfoGain);
        this.lfoGain.connect(this.filter.frequency);
        this.lfo.start();
        this.effectInput.connect(this.filter);
        this.filter.connect(this.effectOutput);
        this.params = [
            { id: 'rate', name: 'RATE', min: 0.1, max: 10, val: 3 },
            { id: 'depth', name: 'DEPTH', min: 100, max: 3000, val: 1500 },
            { id: 'reso', name: 'RESO', min: 1, max: 20, val: 10 },
            { id: 'freq', name: 'BASE', min: 200, max: 2000, val: 800 }
        ];
        this.onParamChange();
    }
    onParamChange() {
        this.lfo.frequency.value = this.params[0].val;
        this.lfoGain.gain.value = this.params[1].val;
        this.filter.Q.value = this.params[2].val;
        this.filter.frequency.value = this.params[3].val;
        this.setMix(0, 1.0);
    }
}
class Od1Effect extends EffectNode {
    constructor(ctx) {
        super(ctx, 'od1', 'OD-1(SD)', 'active-red');
        this.preEq = ctx.createBiquadFilter();
        this.preEq.type = 'highpass';
        this.preEq.frequency.value = 300; 
        this.shaper = ctx.createWaveShaper();
        this.shaper.oversample = '4x';
        this.tone = ctx.createBiquadFilter();
        this.tone.type = 'lowpass';
        this.effectInput.connect(this.preEq);
        this.preEq.connect(this.shaper);
        this.shaper.connect(this.tone);
        this.tone.connect(this.effectOutput);
        this.params = [
            { id: 'drive', name: 'DRIVE', min: 0, max: 100, val: 50 },
            { id: 'tone', name: 'TONE', min: 500, max: 5000, val: 2000 },
            { id: 'level', name: 'LEVEL', min: 0, max: 100, val: 50 }
        ];
        this.onParamChange();

class GeqEffect extends EffectNode {

        ];

class ModEffect extends EffectNode {
    constructor(ctx) {
        super(ctx, 'mod', 'PHASER', 'active-blue');
        this.stages = [];
        let prev = this.effectInput;
        for(let i=0; i<4; i++) {
            let f = ctx.createBiquadFilter();
            f.type = 'allpass';
            prev.connect(f);
            prev = f;
            this.stages.push(f);
        }
        prev.connect(this.effectOutput);
        this.fbGain = ctx.createGain();
        prev.connect(this.fbGain);
        this.fbGain.connect(this.stages[0]);
        this.lfo = ctx.createOscillator();
        this.lfo.type = 'sine';
        this.lfoGain = ctx.createGain();
        this.lfo.connect(this.lfoGain);
        for(let f of this.stages) {
            this.lfoGain.connect(f.frequency);
        }
        this.lfo.start();
        this.params = [
            { id: 'rate', name: 'RATE', min: 0.1, max: 10, val: 1 },
            { id: 'depth', name: 'DEPTH', min: 100, max: 2000, val: 1000 },
            { id: 'reso', name: 'RESO', min: 0, max: 0.9, val: 0.5 },
            { id: 'mix', name: 'MIX', min: 0, max: 100, val: 50 }
        ];
        this.onParamChange();
    }
    onParamChange() {
        this.lfo.frequency.value = this.params[0].val;
        this.lfoGain.gain.value = this.params[1].val;
        this.fbGain.gain.value = this.params[2].val;
        for(let f of this.stages) f.frequency.value = 1000;
        let mix = this.params[3].val / 100;
        this.setMix(1.0 - mix*0.5, mix);
    }
}

    updateXY(x, y) {
        const t = this.ctx.currentTime;
        this.delay.delayTime.setTargetAtTime(0.01 + x * 0.39, t, 0.05);
        this.fbGain.gain.setTargetAtTime(y * 0.98, t, 0.05);
        this.filter.frequency.setTargetAtTime(200 + y * 7800, t, 0.05);
    }
}
function initAudio() {
    if(audioCtx) return;
    audioCtx = new AudioContext();
    effects = [
        new GateEffect(audioCtx),
        new CompEffect(audioCtx),
        new AutoWahEffect(audioCtx),
        new GeqEffect(audioCtx),
        new Od1Effect(audioCtx),
        new Od2Effect(audioCtx),
        new Ds1Effect(audioCtx),
        new Ds2Effect(audioCtx),
        new FuzzEffect(audioCtx),
        new ModEffect(audioCtx),
        new ChorusEffect(audioCtx),
        new FlangerEffect(audioCtx),
        new SlicerEffect(audioCtx),
        new DelayEffect(audioCtx),
        new ChaosEffect(audioCtx)
    ];
    for(let i=0; i<effects.length-1; i++) {
        effects[i].output.connect(effects[i+1].input);
    }
    effects[effects.length-1].output.connect(audioCtx.destination);
    mediaStreamDest = audioCtx.createMediaStreamDestination();
    effects[effects.length-1].output.connect(mediaStreamDest);
    buildFootSwitches();
    selectEffect(effects[4]); 
}
function buildFootSwitches() {
    footswitchesContainer.innerHTML = '';
    effects.forEach((eff, idx) => {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center justify-center footswitch-container';
        div.innerHTML = `
            <div class="led-bezel">
                <div class="led ${eff.bypass ? '' : eff.colorClass}" id="led-${idx}"></div>
            </div>
            <div class="footswitch" id="fs-${idx}">
                <div class="footswitch-nut"></div>
            </div>
            <div class="mt-4 text-xs font-bold text-gray-400 tracking-wider cursor-pointer hover:text-white bg-[#111] px-2 py-1 rounded border border-[#333] shadow-inner" id="lbl-${idx}">${eff.name}</div>
        `;
        footswitchesContainer.appendChild(div);
        document.getElementById(`fs-${idx}`).addEventListener('click', () => {
            const isBypass = eff.toggle();
            const led = document.getElementById(`led-${idx}`);
            if(isBypass) {
                led.classList.remove(eff.colorClass);
            } else {
                led.classList.add(eff.colorClass);
            }
            if(currentEditEffect === eff) updateLcdStatus();
        });
        document.getElementById(`lbl-${idx}`).addEventListener('click', () => {
            selectEffect(eff);
        });
    });
}
function selectEffect(eff) {
    currentEditEffect = eff;
    lcdTitle.textContent = eff.name;
    updateLcdStatus();
    renderLcdParams();
}
function updateLcdStatus() {
    if(!currentEditEffect) return;
    if(currentEditEffect.bypass) {
        lcdStatus.textContent = 'BYPASS';
        lcdStatus.style.borderColor = 'rgba(51,255,204,0.3)';
        lcdStatus.style.color = 'rgba(51,255,204,0.5)';
        lcdStatus.style.textShadow = 'none';
        lcdStatus.style.boxShadow = 'none';
    } else {
        lcdStatus.textContent = 'ACTIVE';
        lcdStatus.style.borderColor = '#33ffcc';
        lcdStatus.style.color = '#fff';
        lcdStatus.style.textShadow = '0 0 5px #33ffcc';
        lcdStatus.style.boxShadow = 'inset 0 0 10px rgba(51,255,204,0.5)';
    }
}
function renderLcdParams() {
    lcdParams.innerHTML = '';
    if(!currentEditEffect || currentEditEffect.params.length === 0) {
        lcdParams.innerHTML = '<div class="w-full text-center text-xl opacity-60 mb-8 tracking-widest">USE XY PAD FOR CONTROL</div>';
        knobs.forEach((k, i) => {
            k.style.transform = `rotate(-135deg)`;
            document.getElementById(`knob-lbl-${i}`).textContent = '--';
        });
        return;
    }
    currentEditEffect.params.forEach((p, i) => {
        if(i >= 4) return;
        const ratio = (p.val - p.min) / (p.max - p.min);
        const percent = Math.round(ratio * 100);
        const displayVal = p.max > 100 ? Math.round(p.val) : p.val.toFixed(1);
        const col = document.createElement('div');
        col.className = 'flex flex-col flex-1 mx-2 items-center';
        col.innerHTML = `
            <span class="text-sm text-[#33ffcc] mb-1 font-bold opacity-80">${p.name}</span>
            <div class="h-16 w-full bg-[#000] border border-[#33ffcc]/30 flex flex-col justify-end p-[2px] relative overflow-hidden">
                <!-- VFD風のセグメントバー -->
                <div class="absolute inset-0 flex flex-col justify-between p-[2px] z-10 pointer-events-none opacity-30">
                    ${Array(8).fill('<div class="h-[1px] w-full bg-[#000]"></div>').join('')}
                </div>
                <div class="w-full transition-all bg-[#33ffcc] shadow-[0_0_10px_#33ffcc]" style="height: ${percent}%;"></div>
            </div>
            <span class="text-lg mt-1 font-bold">${displayVal}</span>
        `;
        lcdParams.appendChild(col);
        const angle = -135 + ratio * 270;
        knobs[i].style.transform = `rotate(${angle}deg)`;
        document.getElementById(`knob-lbl-${i}`).textContent = p.name;
    });
    for(let i = currentEditEffect.params.length; i < 4; i++) {
        knobs[i].style.transform = `rotate(-135deg)`;
        document.getElementById(`knob-lbl-${i}`).textContent = '--';
    }
}
let activeKnob = null;
let startY = 0;
let startRatio = 0;
knobs.forEach(knob => {
    knob.addEventListener('mousedown', (e) => {
        if(!currentEditEffect || currentEditEffect.params.length === 0) return;
        const paramIdx = parseInt(knob.dataset.param);
        if(paramIdx >= currentEditEffect.params.length) return;
        activeKnob = { el: knob, idx: paramIdx };
        startY = e.clientY;
        const p = currentEditEffect.params[paramIdx];
        startRatio = (p.val - p.min) / (p.max - p.min);
        document.body.style.cursor = 'ns-resize';
    });
});
window.addEventListener('mousemove', (e) => {
    if(!activeKnob) return;
    const deltaY = startY - e.clientY;
    let newRatio = startRatio + (deltaY / 150);
    newRatio = Math.max(0, Math.min(1, newRatio));
    currentEditEffect.updateParam(activeKnob.idx, newRatio);
    renderLcdParams();
});
window.addEventListener('mouseup', () => {
    activeKnob = null;
    document.body.style.cursor = 'default';
});
let isPadActive = false;
chaosPad.addEventListener('mousedown', (e) => {
    isPadActive = true;
    chaosCursor.style.opacity = 1;
    handlePadMove(e);
});
window.addEventListener('mousemove', (e) => {
    if(isPadActive) handlePadMove(e);
});
window.addEventListener('mouseup', () => {
    isPadActive = false;
    chaosCursor.style.opacity = 0;
});
function handlePadMove(e) {
    const rect = chaosPad.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    x = Math.max(0, Math.min(rect.width, x));
    y = Math.max(0, Math.min(rect.height, y));
    chaosCursor.style.left = x + 'px';
    chaosCursor.style.top = y + 'px';
    let normX = x / rect.width;
    let normY = 1.0 - (y / rect.height);
    const chaos = effects.find(e => e.id === 'chaos');
    if(chaos && !chaos.bypass) {
        chaos.updateXY(normX, normY);
    }
}
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if(!audioCtx) initAudio();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    const arrayBuffer = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    playBtn.textContent = '▶ PLAY';
    playBtn.classList.remove('from-red-700', 'to-red-900', 'border-red-950');
    playBtn.classList.add('from-green-700', 'to-green-900', 'border-green-950');
    isPlaying = false;
});
playBtn.addEventListener('click', async () => {
    if(!audioBuffer) {
        alert("音源ファイルを選択してください。");
        return;
    }
    if(!audioCtx) initAudio();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    if(isPlaying) {
        if(sourceNode) {
            sourceNode.stop();
            sourceNode.disconnect();
        }
        isPlaying = false;
        playBtn.innerHTML = '▶ PLAY';
        playBtn.classList.remove('from-red-700', 'to-red-900', 'border-red-950');
        playBtn.classList.add('from-green-700', 'to-green-900', 'border-green-950');
    } else {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.loop = true;
        sourceNode.connect(effects[0].input);
        sourceNode.start();
        isPlaying = true;
        playBtn.innerHTML = '■ STOP';
        playBtn.classList.remove('from-green-700', 'to-green-900', 'border-green-950');
        playBtn.classList.add('from-red-700', 'to-red-900', 'border-red-950');
    }
});
recBtn.addEventListener('click', async () => {
    if(!audioCtx) {
        alert("先に音源ファイルを選択してください。");
        return;
    }
    if(isRecording) {
        mediaRecorder.stop();
        recBtn.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_5px_red]"></span> REC / SAVE';
        recBtn.classList.remove('recording');
        isRecording = false;
    } else {
        recordedChunks = [];
        const types = ['audio/webm', 'audio/ogg', 'audio/mp4'];
        let mimeType = '';
        for (let t of types) {
            if (MediaRecorder.isTypeSupported(t)) {
                mimeType = t;
                break;
            }
        }
        mediaRecorder = new MediaRecorder(mediaStreamDest.stream, { mimeType: mimeType });
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
            a.download = `FX_Processed_Audio.${ext}`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };
        mediaRecorder.start();
        recBtn.innerHTML = '■ STOP & SAVE';
        recBtn.classList.add('recording');
        isRecording = true;
    }
});
</script>
</body>
</html>
